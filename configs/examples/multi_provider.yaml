experiment_name: multi_provider_comparison
datasets:
  - name: evouna_tq
    path: data/EVOUNA/TQ.json
  - name: evouna_nq
    path: data/EVOUNA/NQ.json

filter:
  improper: false
  exclude_non_boolean_labels: true
  exclude_empty_candidate_answers: true

judge_models:
  # ── OpenAI ──────────────────────────────────────────────────────────────
  # export OPENAI_API_KEY=sk-...
  - name: gpt-4o
    provider: openai_compatible
    model: gpt-4o
    endpoint: https://api.openai.com/v1/chat/completions
    api_key_env: OPENAI_API_KEY
    temperature: 0.0
    max_tokens: 512

  - name: gpt-4o-mini
    provider: openai_compatible
    model: gpt-4o-mini
    endpoint: https://api.openai.com/v1/chat/completions
    api_key_env: OPENAI_API_KEY
    temperature: 0.0
    max_tokens: 512

  - name: gpt-4.1
    provider: openai_compatible
    model: gpt-4.1
    endpoint: https://api.openai.com/v1/chat/completions
    api_key_env: OPENAI_API_KEY
    temperature: 0.0
    max_tokens: 512

  - name: gpt-4.1-mini
    provider: openai_compatible
    model: gpt-4.1-mini
    endpoint: https://api.openai.com/v1/chat/completions
    api_key_env: OPENAI_API_KEY
    temperature: 0.0
    max_tokens: 512

  # ── Qwen (Alibaba Cloud DashScope) ──────────────────────────────────────
  # export DASHSCOPE_API_KEY=sk-...
  - name: qwen3-235b
    provider: openai_compatible
    model: qwen3-235b-a22b
    endpoint: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
    api_key_env: DASHSCOPE_API_KEY
    temperature: 0.0
    max_tokens: 512

  - name: qwen3-32b
    provider: openai_compatible
    model: qwen3-32b
    endpoint: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
    api_key_env: DASHSCOPE_API_KEY
    temperature: 0.0
    max_tokens: 512

  - name: qwen-max
    provider: openai_compatible
    model: qwen-max
    endpoint: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
    api_key_env: DASHSCOPE_API_KEY
    temperature: 0.0
    max_tokens: 512

  - name: qwen-plus
    provider: openai_compatible
    model: qwen-plus
    endpoint: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
    api_key_env: DASHSCOPE_API_KEY
    temperature: 0.0
    max_tokens: 512

  # ── Zhipu AI (GLM) ──────────────────────────────────────────────────────
  # export ZHIPU_API_KEY=...
  - name: glm-4-plus
    provider: openai_compatible
    model: glm-4-plus
    endpoint: https://open.bigmodel.cn/api/paas/v4/chat/completions
    api_key_env: ZHIPU_API_KEY
    temperature: 0.0
    max_tokens: 512

  - name: glm-4-flash
    provider: openai_compatible
    model: glm-4-flash
    endpoint: https://open.bigmodel.cn/api/paas/v4/chat/completions
    api_key_env: ZHIPU_API_KEY
    temperature: 0.0
    max_tokens: 512

  - name: glm-4-air
    provider: openai_compatible
    model: glm-4-air
    endpoint: https://open.bigmodel.cn/api/paas/v4/chat/completions
    api_key_env: ZHIPU_API_KEY
    temperature: 0.0
    max_tokens: 512

evaluation:
  prompt_templates:
    - minimal
    - guideline
    - guideline_with_examples
  retry_count: 5
  invalid_output_policy: store_invalid
  bootstrap_iterations: 200
  enable_prompt_sensitivity: true
  enable_reference_order_sensitivity: true
  enable_dummy_answer_test: true

output:
  experiment_name: multi_provider_comparison
  save_raw_predictions: true
  save_report: true

telemetry:
  enabled: true
  provider: arize
  project_name: meta-judge-eval
  dataset_name: meta-judge-eval
  space: ${ARIZE_SPACE_ID}