experiment_name: openai_small_models_4way
datasets:
  - name: evouna_tq
    path: data/EVOUNA/TQ.json
    sampling:
      sample_size: 600
      seed: 42
  - name: evouna_nq
    path: data/EVOUNA/NQ.json
    sampling:
      sample_size: 600
      seed: 42

filter:
  improper: false
  exclude_non_boolean_labels: true
  exclude_empty_candidate_answers: true

judge_models:
  - name: gpt_5_4_mini
    provider: openai_compatible
    model: gpt-5.4-mini
    endpoint: https://api.openai.com/v1/chat/completions
    api_key_env: OPENAI_API_KEY
    temperature: 0.0
    max_tokens: 512

  - name: gpt_5_4_nano
    provider: openai_compatible
    model: gpt-5.4-nano
    endpoint: https://api.openai.com/v1/chat/completions
    api_key_env: OPENAI_API_KEY
    temperature: 0.0
    max_tokens: 512

  - name: gpt_4_1_mini
    provider: openai_compatible
    model: gpt-4.1-mini
    endpoint: https://api.openai.com/v1/chat/completions
    api_key_env: OPENAI_API_KEY
    temperature: 0.0
    max_tokens: 512

  - name: gpt_4_1_nano
    provider: openai_compatible
    model: gpt-4.1-nano
    endpoint: https://api.openai.com/v1/chat/completions
    api_key_env: OPENAI_API_KEY
    temperature: 0.0
    max_tokens: 512

evaluation:
  prompt_templates:
    - minimal
  retry_count: 0
  invalid_output_policy: store_invalid
  bootstrap_iterations: 200
  enable_prompt_sensitivity: false
  enable_reference_order_sensitivity: false
  enable_dummy_answer_test: false

output:
  experiment_name: openai_small_models_4way
  save_raw_predictions: true
  save_report: true

telemetry:
  enabled: false
