experiment_name: openai_judge_example
datasets:
  - name: evouna_tq
    path: data/EVOUNA/TQ.json

filter:
  improper: false
  exclude_non_boolean_labels: true
  exclude_empty_candidate_answers: true

judge_models:
  # OpenAI API — gpt-4o
  - name: gpt4o_judge
    provider: openai_compatible
    model: gpt-4o
    endpoint: https://api.openai.com/v1/chat/completions
    api_key_env: OPENAI_API_KEY   # export OPENAI_API_KEY=sk-...
    temperature: 0.0
    max_tokens: 256

  # OpenAI API — gpt-4o-mini (비용 절감용)
  - name: gpt4o_mini_judge
    provider: openai_compatible
    model: gpt-4o-mini
    endpoint: https://api.openai.com/v1/chat/completions
    api_key_env: OPENAI_API_KEY
    temperature: 0.0
    max_tokens: 256

evaluation:
  prompt_templates:
    - minimal
    - guideline
    - guideline_with_examples
  retry_count: 2
  invalid_output_policy: store_invalid
  bootstrap_iterations: 200
  enable_prompt_sensitivity: true
  enable_reference_order_sensitivity: true
  enable_dummy_answer_test: true

output:
  experiment_name: openai_judge_example
  save_raw_predictions: true
  save_report: true

telemetry:
  enabled: false
