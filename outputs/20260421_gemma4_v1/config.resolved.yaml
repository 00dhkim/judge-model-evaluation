experiment_name: multi_provider_comparison
datasets:
- name: evouna_tq
  path: data/EVOUNA/TQ.json
  sampling:
    sample_size: 10
    seed: 42
- name: evouna_nq
  path: data/EVOUNA/NQ.json
  sampling:
    sample_size: 10
    seed: 42
filter:
  improper: false
  exclude_non_boolean_labels: true
  exclude_empty_candidate_answers: true
judge_models:
- name: google-gemma-4-E2B-it
  provider: openai_compatible
  model: google-gemma-4-E2B-it
  endpoint: http://localhost:8000/v1/chat/completions
  api_key_env: dummy
  temperature: 0.0
  max_tokens: 512
  api_key: <redacted-env>
evaluation:
  prompt_templates:
  - minimal
  - guideline
  - guideline_with_examples
  retry_count: 5
  invalid_output_policy: store_invalid
  bootstrap_iterations: 200
  enable_prompt_sensitivity: true
  enable_reference_order_sensitivity: true
  enable_dummy_answer_test: true
output:
  experiment_name: gemma4_v1
  save_raw_predictions: true
  save_report: true
telemetry:
  enabled: true
  provider: arize
  project_name: meta-judge-eval
  dataset_name: meta-judge-eval
  space: U3BhY2U6MzIwMjI6L1dXcQ==
  env_refs:
  - ARIZE_API_KEY
  - ARIZE_SPACE_ID
