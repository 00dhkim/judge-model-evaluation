experiment_name: gemma_hosted_4way_free
datasets:
- name: evouna_tq
  path: data/EVOUNA/TQ.json
  sampling:
    sample_size: 600
    seed: 42
- name: evouna_nq
  path: data/EVOUNA/NQ.json
  sampling:
    sample_size: 600
    seed: 42
filter:
  improper: false
  exclude_non_boolean_labels: true
  exclude_empty_candidate_answers: true
judge_models:
- name: gemma_3_27b
  provider: openai_compatible
  model: gemma-3-27b-it
  endpoint: https://generativelanguage.googleapis.com/v1beta/openai/chat/completions
  api_key_env: GOOGLE_API_KEY
  temperature: 0.0
  max_tokens: 512
- name: gemma_3_12b
  provider: openai_compatible
  model: gemma-3-12b-it
  endpoint: https://generativelanguage.googleapis.com/v1beta/openai/chat/completions
  api_key_env: GOOGLE_API_KEY
  temperature: 0.0
  max_tokens: 512
- name: gemma_4_26b
  provider: openai_compatible
  model: gemma-4-26b-a4b-it
  endpoint: https://generativelanguage.googleapis.com/v1beta/openai/chat/completions
  api_key_env: GOOGLE_API_KEY
  temperature: 0.0
  max_tokens: 512
- name: gemma_4_31b
  provider: openai_compatible
  model: gemma-4-31b-it
  endpoint: https://generativelanguage.googleapis.com/v1beta/openai/chat/completions
  api_key_env: GOOGLE_API_KEY
  temperature: 0.0
  max_tokens: 512
evaluation:
  prompt_templates:
  - minimal
  retry_count: 0
  invalid_output_policy: store_invalid
  bootstrap_iterations: 200
  enable_prompt_sensitivity: false
  enable_reference_order_sensitivity: false
  enable_dummy_answer_test: false
output:
  experiment_name: gemma_hosted_4way_free
  save_raw_predictions: true
  save_report: true
telemetry:
  enabled: true
  provider: arize
  project_name: meta-judge-eval
  dataset_name: meta-judge-eval
  space: U3BhY2U6MzIwMjI6L1dXcQ==
  env_refs:
  - ARIZE_API_KEY
  - ARIZE_SPACE_ID
